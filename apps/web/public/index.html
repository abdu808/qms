<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام إدارة الجودة - جمعية البر بصبيا</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🕊️%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Noto Kufi Arabic', 'system-ui', 'sans-serif'] },
        colors: {
          brand:   { 50:'#f0f9f4', 100:'#dcf2e3', 500:'#2e8b57', 600:'#206d43', 700:'#1a5a38' },
        }
      }
    }
  }
</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="app()" x-init="init()">

  <!-- LOGIN -->
  <template x-if="!user">
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-50 to-brand-100 p-6">
      <form @submit.prevent="login()" class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md border">
        <div class="text-center mb-6">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-500 text-white rounded-full mb-3 text-3xl">🕊️</div>
          <h1 class="text-2xl font-bold text-brand-700">نظام إدارة الجودة</h1>
          <p class="text-sm text-gray-500 mt-1">جمعية البر بمحافظة صبيا</p>
          <p class="text-xs text-gray-400 mt-1">ISO 9001:2015</p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
            <input type="email" x-model="loginForm.email" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">كلمة المرور</label>
            <input type="password" x-model="loginForm.password" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
          </div>
          <button type="submit" :disabled="loading" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-lg transition disabled:opacity-50">
            <span x-show="!loading">تسجيل الدخول</span>
            <span x-show="loading">جاري التحقق...</span>
          </button>
          <div x-show="loginError" x-text="loginError" class="text-sm text-red-600 bg-red-50 border border-red-200 rounded p-2"></div>
        </div>
        <div class="text-xs text-gray-400 text-center mt-6">© 2026 جمعية البر بصبيا</div>
      </form>
    </div>
  </template>

  <!-- APP SHELL -->
  <template x-if="user">
    <div class="min-h-screen bg-gradient-to-bl from-gray-100 to-gray-200" x-data="{ sidebarOpen: false }">
      <!-- MOBILE OVERLAY -->
      <div x-show="sidebarOpen" x-cloak @click="sidebarOpen=false"
           class="fixed inset-0 bg-black/40 z-30 md:hidden"></div>

      <!-- SIDEBAR (floating card — visually separated from body) -->
      <aside :class="sidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'"
             class="fixed top-4 right-4 bottom-4 w-60 bg-white rounded-2xl shadow-xl ring-1 ring-black/5 flex flex-col z-40 transition-transform duration-200 md:transition-none overflow-hidden">
        <div class="p-4 bg-gradient-to-l from-brand-600 to-brand-500 text-white flex items-center justify-between flex-shrink-0">
          <div class="flex items-center gap-2">
            <span class="text-2xl">🕊️</span>
            <div>
              <div class="font-bold">نظام الجودة</div>
              <div class="text-xs opacity-80">جمعية البر بصبيا</div>
            </div>
          </div>
          <button @click="sidebarOpen=false" class="md:hidden text-white text-xl">✖</button>
        </div>
        <nav class="flex-1 p-2 overflow-y-auto text-sm">
          <template x-for="item in menu" :key="item.id">
            <button @click="goto(item.id); sidebarOpen=false" :class="page===item.id ? 'bg-brand-500 text-white font-semibold shadow-sm' : 'hover:bg-gray-100 text-gray-700'"
              class="w-full text-right px-3 py-2 rounded-lg mb-1 flex items-center gap-2 transition">
              <span x-text="item.icon"></span>
              <span x-text="item.label"></span>
            </button>
          </template>
        </nav>
        <div class="p-3 border-t text-xs bg-gray-50 flex-shrink-0">
          <div class="font-semibold" x-text="user.name"></div>
          <div class="text-gray-500" x-text="roleLabel(user.role)"></div>
          <button @click="logout()" class="mt-2 w-full text-red-600 hover:bg-red-50 rounded px-2 py-1">تسجيل الخروج</button>
        </div>
      </aside>

      <!-- MAIN (offset by sidebar width + gap; scrolls independently) -->
      <main class="md:mr-[17rem] md:ml-4 md:py-4 min-h-screen flex flex-col">
        <header class="bg-white rounded-2xl shadow-sm ring-1 ring-black/5 mx-4 md:mx-0 mt-4 md:mt-0 px-4 md:px-6 py-3 flex items-center justify-between sticky top-4 z-20">
          <div class="flex items-center gap-3">
            <button @click="sidebarOpen=true" class="md:hidden text-2xl text-brand-600 hover:bg-gray-100 rounded p-1" aria-label="فتح القائمة">☰</button>
            <h2 class="text-lg font-bold" x-text="menu.find(m=>m.id===page)?.label || 'لوحة المعلومات'"></h2>
          </div>
          <div class="text-xs text-gray-500" x-text="today()"></div>
        </header>

        <div class="p-4 md:p-6">
          <!-- DASHBOARD -->
          <div x-show="page==='dashboard'">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
              <template x-for="card in dashCards" :key="card.label">
                <div class="bg-white rounded-xl border p-4 shadow-sm">
                  <div class="text-xs text-gray-500 mb-1" x-text="card.label"></div>
                  <div class="text-2xl font-bold" :class="card.color" x-text="card.value"></div>
                  <div class="text-xs text-gray-400 mt-1" x-text="card.sub"></div>
                </div>
              </template>
            </div>
            <div class="bg-white border rounded-xl p-6 mt-6">
              <h3 class="font-semibold mb-4">ملخص المؤشرات</h3>
              <canvas id="dashChart" height="80"></canvas>
            </div>
          </div>

          <!-- GENERIC LIST PAGE -->
          <template x-if="page !== 'dashboard' && page !== 'audit-log' && page !== 'iso-readiness' && page !== 'surveys'">
            <div>
              <!-- Toolbar (sticky — stays visible while scrolling table) -->
              <div class="sticky top-[76px] z-10 px-4 md:px-6 py-3 mb-4 bg-white/90 backdrop-blur rounded-2xl shadow-sm ring-1 ring-black/5 mx-4 md:mx-0 flex items-center gap-2 flex-wrap">
                <input x-model="search" @input.debounce.400ms="loadList(1)" placeholder="🔍 بحث..." class="border rounded-lg px-3 py-2 flex-1 min-w-[160px] max-w-xs" />
                <select x-show="currentModule?.statusOptions" x-model="filterStatus" @change="loadList(1)" class="border rounded-lg px-3 py-2 text-sm bg-white">
                  <template x-for="o in (currentModule?.statusOptions||[])" :key="o.v">
                    <option :value="o.v" x-text="o.l"></option>
                  </template>
                </select>
                <button @click="openCreate()" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm">➕ إضافة</button>
                <button x-show="currentModule?.exportable" @click="exportExcel()" class="border border-green-600 text-green-700 hover:bg-green-50 px-4 py-2 rounded-lg text-sm font-medium">⬇️ Excel</button>
                <span class="text-xs text-gray-500 mr-auto" x-show="totalItems" x-text="'الإجمالي: ' + totalItems"></span>
              </div>

              <!-- Table -->
              <div class="bg-white border rounded-xl">
                <table class="w-full text-sm">
                  <thead class="bg-gray-100 text-right">
                    <tr>
                      <template x-for="col in currentCols" :key="col.key">
                        <th class="px-3 py-2 font-semibold text-gray-600" x-text="col.label"></th>
                      </template>
                      <th class="px-3 py-2">الإجراءات</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="item in items" :key="item.id">
                      <tr class="border-t hover:bg-gray-50">
                        <template x-for="col in currentCols" :key="col.key">
                          <td class="px-3 py-2" x-html="renderCell(item, col)"></td>
                        </template>
                        <td class="px-3 py-2 whitespace-nowrap">
                          <button @click="openEdit(item)" class="text-blue-600 hover:underline text-xs ml-2">✏️ تعديل</button>
                          <button @click="remove(item.id)" class="text-red-600 hover:underline text-xs ml-2">🗑️ حذف</button>
                          <button x-show="currentModule?.evalAction" @click="openEval(item)" class="text-indigo-600 hover:underline text-xs ml-2">📊 تقييم</button>
                          <button x-show="currentModule?.evalAction" @click="requestEvalLink(item)" class="text-teal-600 hover:underline text-xs ml-2">🔗 رابط خارجي</button>
                          <button x-show="page==='documents' && item.status==='UNDER_REVIEW'" @click="approveDoc(item, false)" class="text-green-600 hover:underline text-xs ml-2">✅ اعتماد</button>
                          <button x-show="page==='documents' && item.status==='APPROVED'" @click="approveDoc(item, true)" class="text-emerald-600 hover:underline text-xs ml-2">📢 نشر</button>
                          <button x-show="page==='documents' && ['DRAFT','APPROVED','PUBLISHED'].includes(item.status)" @click="obsoleteDoc(item)" class="text-amber-600 hover:underline text-xs ml-2">🗑️ سحب</button>
                          <button x-show="page==='qualityPolicy' && !item.active" @click="activatePolicy(item)" class="text-green-600 hover:underline text-xs ml-2">✅ تفعيل</button>
                          <button x-show="page==='training'" @click="openTrainingRecords(item)" class="text-teal-600 hover:underline text-xs ml-2">👥 الحضور والفعالية</button>
                          <button x-show="currentModule?.sigAction" @click="openSig(item)" class="text-purple-600 hover:underline text-xs">✍️ توقيع</button>
                        </td>
                      </tr>
                    </template>
                    <tr x-show="!items.length">
                      <td :colspan="currentCols.length+1" class="text-center text-gray-400 py-8">لا توجد بيانات</td>
                    </tr>
                  </tbody>
                </table>

                <!-- Pagination -->
                <div x-show="totalPages > 1" class="flex items-center justify-between px-4 py-3 border-t bg-gray-50 text-sm">
                  <span class="text-gray-500" x-text="`${totalItems} سجل — صفحة ${currentPage} من ${totalPages}`"></span>
                  <div class="flex gap-2">
                    <button @click="prevPage()" :disabled="currentPage===1" class="px-3 py-1 border rounded-lg disabled:opacity-40 hover:bg-gray-100">→ السابق</button>
                    <button @click="nextPage()" :disabled="currentPage>=totalPages" class="px-3 py-1 border rounded-lg disabled:opacity-40 hover:bg-gray-100">التالي ←</button>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- ISO READINESS -->
          <div x-show="page==='iso-readiness'" x-cloak>
            <template x-if="isoReport">
              <div>
                <!-- Header -->
                <div class="bg-gradient-to-l from-brand-600 to-brand-500 text-white rounded-xl p-6 mb-4 shadow">
                  <div class="flex justify-between items-center flex-wrap gap-4">
                    <div>
                      <div class="text-sm opacity-90">تقرير جاهزية نظام إدارة الجودة</div>
                      <h2 class="text-2xl font-bold mt-1">ISO 9001:2015 Readiness</h2>
                      <div class="mt-2 text-lg" x-text="isoReport.level"></div>
                    </div>
                    <div class="text-center">
                      <div class="text-5xl font-bold" x-text="isoReport.percentage + '%'"></div>
                      <div class="text-sm opacity-90 mt-1" x-text="isoReport.totalScore + ' / ' + isoReport.totalWeight + ' نقطة'"></div>
                    </div>
                  </div>
                  <div class="mt-4 h-3 bg-white/30 rounded-full overflow-hidden">
                    <div class="h-full bg-white rounded-full transition-all" :style="'width:' + isoReport.percentage + '%'"></div>
                  </div>
                </div>

                <!-- Clauses table -->
                <div class="bg-white border rounded-xl overflow-hidden">
                  <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-right">
                      <tr>
                        <th class="px-3 py-2">البند</th>
                        <th class="px-3 py-2">العنوان</th>
                        <th class="px-3 py-2">المطلوب</th>
                        <th class="px-3 py-2">الواقع الحالي</th>
                        <th class="px-3 py-2 text-center">الحالة</th>
                        <th class="px-3 py-2 text-center">النقاط</th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="c in isoReport.clauses" :key="c.clause">
                        <tr class="border-t hover:bg-gray-50">
                          <td class="px-3 py-2 font-bold text-brand-700" x-text="c.clause"></td>
                          <td class="px-3 py-2" x-text="c.title"></td>
                          <td class="px-3 py-2 text-gray-600 text-xs" x-text="c.required"></td>
                          <td class="px-3 py-2 text-xs" x-text="c.evidence"></td>
                          <td class="px-3 py-2 text-center">
                            <span x-show="c.ok" class="text-green-600 font-bold">✓</span>
                            <span x-show="!c.ok" class="text-red-500 font-bold">✗</span>
                          </td>
                          <td class="px-3 py-2 text-center font-medium" x-text="c.score + '/' + c.weight"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>

                <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mt-4 text-sm">
                  <div class="font-bold text-amber-800 mb-1">💡 ملاحظة</div>
                  <div class="text-amber-700">هذا التقرير يعكس جاهزية البيانات المدخلة في النظام. الاعتماد الفعلي للأيزو يتطلب أيضاً: تنفيذ فعلي على أرض الواقع، دليل جودة موثق، ومراجعة من جهة مانحة معتمدة.</div>
                </div>
              </div>
            </template>
            <div x-show="!isoReport" class="text-center text-gray-400 py-20">جار التحميل...</div>
          </div>

          <!-- SURVEYS (custom module) -->
          <div x-show="page==='surveys'" x-cloak>
            <div class="sticky top-[76px] z-10 px-4 md:px-6 py-3 mb-4 bg-white/90 backdrop-blur rounded-2xl shadow-sm ring-1 ring-black/5 mx-4 md:mx-0 flex justify-between items-center flex-wrap gap-2">
              <div>
                <h2 class="text-xl font-bold">📝 استبيانات رضا العملاء (ISO 9.1.2)</h2>
                <div class="text-sm text-gray-500">قياس رضا المستفيدين والشركاء عبر روابط عامة قابلة للمشاركة</div>
              </div>
              <button @click="openSurveyCreate()" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg">➕ استبيان جديد</button>
            </div>

            <div class="bg-white border rounded-xl overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 text-right">
                  <tr>
                    <th class="px-3 py-2">الرمز</th>
                    <th class="px-3 py-2">العنوان</th>
                    <th class="px-3 py-2">الفئة</th>
                    <th class="px-3 py-2 text-center">المشاركات</th>
                    <th class="px-3 py-2 text-center">المتوسط</th>
                    <th class="px-3 py-2 text-center">الحالة</th>
                    <th class="px-3 py-2 text-center">إجراءات</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="s in surveysList" :key="s.id">
                    <tr class="border-t hover:bg-gray-50">
                      <td class="px-3 py-2 font-mono text-xs" x-text="s.code"></td>
                      <td class="px-3 py-2 font-medium" x-text="s.title"></td>
                      <td class="px-3 py-2" x-text="({BENEFICIARY:'المستفيدون',DONOR:'المتبرعون',VOLUNTEER:'المتطوعون',EMPLOYEE:'الموظفون',PARTNER:'الشركاء'})[s.target] || s.target"></td>
                      <td class="px-3 py-2 text-center" x-text="s.responses || 0"></td>
                      <td class="px-3 py-2 text-center">
                        <span x-show="s.avgScore !== null" x-text="(s.avgScore || 0).toFixed(2) + ' ⭐'" class="font-semibold text-amber-600"></span>
                        <span x-show="s.avgScore === null" class="text-gray-400">—</span>
                      </td>
                      <td class="px-3 py-2 text-center">
                        <span x-show="s.active" class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">نشط</span>
                        <span x-show="!s.active" class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">مغلق</span>
                      </td>
                      <td class="px-3 py-2 text-center whitespace-nowrap">
                        <button @click="copySurveyLink(s)" class="text-blue-600 hover:underline text-xs mx-1" title="نسخ الرابط العام">🔗 رابط</button>
                        <button @click="shareWhatsappSurvey(s)" class="text-green-600 hover:underline text-xs mx-1" title="مشاركة واتساب">💬 واتساب</button>
                        <button @click="viewSurveySummary(s)" class="text-purple-600 hover:underline text-xs mx-1">📊 النتائج</button>
                        <button @click="openSurveyEdit(s)" class="text-brand-600 hover:underline text-xs mx-1">✏️</button>
                        <button @click="deleteSurvey(s)" class="text-red-600 hover:underline text-xs mx-1">🗑️</button>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="!surveysList.length">
                    <td colspan="7" class="text-center py-10 text-gray-400">لا توجد استبيانات — ابدأ بإنشاء استبيان جديد</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- AUDIT LOG -->
          <div x-show="page==='audit-log'">
            <div class="bg-white border rounded-xl overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 text-right">
                  <tr>
                    <th class="px-3 py-2">التاريخ</th>
                    <th class="px-3 py-2">المستخدم</th>
                    <th class="px-3 py-2">العملية</th>
                    <th class="px-3 py-2">الكيان</th>
                    <th class="px-3 py-2">IP</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="log in auditLog" :key="log.id">
                    <tr class="border-t">
                      <td class="px-3 py-2 text-xs text-gray-500" x-text="fmtDate(log.at)"></td>
                      <td class="px-3 py-2" x-text="log.user?.name || '—'"></td>
                      <td class="px-3 py-2"><span class="px-2 py-0.5 rounded text-xs bg-gray-100" x-text="log.action"></span></td>
                      <td class="px-3 py-2 text-xs" x-text="(log.entityType||'') + (log.entityId? ' / ' + log.entityId.slice(0,8) : '')"></td>
                      <td class="px-3 py-2 text-xs text-gray-400" x-text="log.ipAddress"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- SUPPLIER EVAL MODAL -->
        <div x-show="evalModal.open" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" @keydown.escape.window="evalModal.open=false">
          <div class="bg-white rounded-xl w-full max-w-xl max-h-[90vh] overflow-y-auto shadow-2xl" @click.outside="evalModal.open=false">
            <div class="p-4 border-b flex justify-between items-center">
              <div>
                <h3 class="font-bold text-brand-700">📊 تقييم أداء المورد</h3>
                <div class="text-sm text-gray-500 mt-0.5" x-text="evalModal.supplier?.name"></div>
              </div>
              <button @click="evalModal.open=false" class="text-gray-400 hover:text-gray-700 text-xl">✖</button>
            </div>
            <div class="p-4 space-y-4">
              <div>
                <label class="block text-sm font-medium mb-1">الفترة التقييمية</label>
                <input x-model="evalModal.period" placeholder="مثال: الربع الأول 2026" class="w-full border rounded-lg px-3 py-2" />
              </div>
              <div class="bg-amber-50 border border-amber-200 rounded-lg p-2.5 text-[11px] text-amber-900 leading-relaxed">
                💡 <b>دليل الدرجات:</b> ممتاز (90%+) · جيد جداً (75%+) · مقبول (60%+) · ضعيف (أقل).
                <div class="text-red-700 mt-0.5">⚠️ فشل معيار حرج (أقل من 50%) = رفض تلقائي</div>
              </div>
              <div class="space-y-3">
                <template x-for="c in evalModal.criteria" :key="c.key">
                  <div class="rounded-lg p-3 border" :class="c.critical ? 'bg-red-50 border-red-200' : 'bg-gray-50'">
                    <div class="flex justify-between items-center mb-2 gap-2 flex-wrap">
                      <label class="text-sm font-medium flex items-center gap-1" >
                        <span x-text="c.label"></span>
                        <span x-show="c.critical" class="text-[10px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-bold">⚠️ حرج</span>
                      </label>
                      <span class="text-xs text-gray-500 font-medium" x-text="`${c.score || 0} / ${c.max}`"></span>
                    </div>
                    <input type="range" x-model="c.score" :min="0" :max="c.max" step="1" class="w-full accent-brand-500" />
                    <div class="h-1.5 bg-gray-200 rounded mt-1">
                      <div class="h-1.5 rounded transition-all" :class="c.critical && (Number(c.score)||0) < c.max*0.5 ? 'bg-red-500' : 'bg-brand-500'" :style="`width:${Math.min(100,(c.score||0)/c.max*100)}%`"></div>
                    </div>

                    <select x-model="modal.data[f.key]" class="w-full border rounded-lg px-3 py-2">
                      <option value="">— لا شيء —</option>
                      <template x-for="o in (relationOptions[f.relation]||[])" :key="o.id">
                        <option :value="o.id" x-text="(o.code ? o.code + ' — ' : '') + (o.title||o.name||'')"></option>
                      </template>
                    </select>
                  </template>
                  <template x-if="!['textarea','select','relation'].includes(f.type||'text')">
                    <input :type="f.type||'text'" x-model="modal.data[f.key]" class="w-full border rounded-lg px-3 py-2" />
                  </template>
                </div>
              </template>
              <div class="flex gap-2 pt-3 border-t">
                <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg">حفظ</button>
                <button type="button" @click="modal.open=false" class="border px-4 py-2 rounded-lg">إلغاء</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </template>

<script src="/app.js"></script>
</body>
</html>
